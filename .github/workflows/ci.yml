name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Make CI script executable
        run: chmod +x scripts/ci_validate.sh scripts/build_invoice_ingest_react.sh

      - name: Run validation
        run: ./scripts/ci_validate.sh
